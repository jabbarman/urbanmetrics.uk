name: Smoke Live Site

on:
  schedule:
    - cron: "45 */6 * * *"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run live smoke checks
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: npm run monitor:site

      - name: Notify Discord on failure
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{"content":"West Midlands Signals live smoke checks failed. Inspect the Smoke Live Site workflow run for details."}'
